    <!-- Tailwind CSS with Institutional Scaling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#f97316', 
              secondary: '#0f172a',
              accent: '#3b82f6',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
            },
            container: {
              center: true,
              padding: '1.5rem',
              screens: {
                xl: '1140px',
                '2xl': '1200px',
              },
            }
          }
        }
      }

    <!-- Slick Carousel CSS -->
    <link rel="stylesheet" type="text/css" charset="UTF-8" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick.min.css" />
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.6.0/slick-theme.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.4);
      }
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #f8fafc;
        color: #0f172a;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
      
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #f97316; }
      
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }
      
      .bg-mesh {
        background-color: #f8fafc;
        background-image: 
          radial-gradient(at 0% 0%, hsla(21, 94%, 53%, 0.04) 0px, transparent 50%),
          radial-gradient(at 100% 100%, hsla(21, 94%, 53%, 0.04) 0px, transparent 50%);
      }

      .slick-dots li button:before { font-size: 8px; color: #f97316; }
      .slick-dots li.slick-active button:before { color: #f97316; }
    </style>
